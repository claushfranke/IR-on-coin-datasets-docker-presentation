services:
  # ─────────────────────────────────────────
  # Backend: FastAPI + TensorFlow
  # ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: coin-analysis-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      # Münzbilder aus dem Frontend (read-only)
      - ./frontend/images:/app/images:ro
      # Persistenter Modell-Speicher
      - model-data:/app/models
    environment:
      - MODELS_DIR=/app/models
      - IMAGES_DIR=/app/images
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # Bei TF + Modell-Download braucht der erste Start etwas
    # Der Healthcheck hat 120s start-period im Dockerfile

  # ─────────────────────────────────────────
  # Frontend: Statischer Webserver (Nginx)
  # ─────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: coin-analysis-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model-data:
    name: coin-analysis-models
