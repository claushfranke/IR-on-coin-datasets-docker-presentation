<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="gold" cx="40%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="50%" stop-color="#C8A951"/>
      <stop offset="100%" stop-color="#A07E3B"/>
    </radialGradient>
  </defs>
  <!-- Coin body -->
  <circle cx="16" cy="16" r="15" fill="url(#gold)" stroke="#A07E3B" stroke-width="1.2"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#8B6B2A" stroke-width="0.8" opacity="0.5"/>
  <!-- Stylised portrait silhouette (head right-facing) -->
  <ellipse cx="16" cy="13" rx="4.5" ry="5" fill="#8B6B2A" opacity="0.5"/>
  <circle cx="16" cy="10.5" r="3.2" fill="#8B6B2A" opacity="0.5"/>
  <!-- Short legend bar at bottom -->
  <rect x="10" y="22" width="12" height="1.5" rx="0.7" fill="#8B6B2A" opacity="0.4"/>
</svg>
