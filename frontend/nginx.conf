upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;

    # Favicon – nie loggen
    location = /favicon.ico {
        root /usr/share/nginx/html;
        log_not_found off;
        access_log off;
    }

    # HTML-Dateien nie cachen – Browser erhält stets die aktuelle Version
    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # API-Anfragen an das Backend weiterleiten.
    # Matched /api/... UND auch /beliebiger-prefix/api/...
    # Funktioniert dadurch sowohl direkt (localhost) als auch hinter einem
    # Reverse-Proxy, der den Sub-Pfad-Prefix strippt oder weiterreicht.
    location ~ /api/ {
        rewrite ^.*/api/(.*)$ /api/$1 break;
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Statische Dateien + SPA-Fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
