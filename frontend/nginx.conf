upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;

    # API-Anfragen im Root-Pfad (localhost / ohne Prefix)
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Statische Dateien im Root-Pfad (localhost / ohne Prefix)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API-Anfragen intern an das Backend weiterleiten.
    # APP_BASE_PATH ist optional, z.B. "/imagnum-piai".
    location ~ ^${APP_BASE_PATH}/api/(.*)$ {
        rewrite            ^${APP_BASE_PATH}/api/(.*)$ /api/$1 break;
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Statische Dateien aus dem Frontend-Verzeichnis.
    # Unter Sub-Path werden Requests auf das Frontend-Root umgebogen.
    location ~ ^${APP_BASE_PATH}/(?<asset_path>.*)$ {
        root /usr/share/nginx/html;
        index index.html;
        try_files /$asset_path /index.html;
    }
}
